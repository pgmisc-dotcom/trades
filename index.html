<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolioTrack | Portfolio Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --ink: #0F172A;
            --line: #E2E8F0;
            --f-sans: 'Inter', sans-serif;
            --f-mono: 'JetBrains Mono', monospace;
        }
        body { font-family: var(--f-sans); background-color: var(--bg); color: var(--ink); }
        [x-cloak] { display: none !important; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        
        @media (max-width: 1024px) {
            .sidebar-open aside { transform: translateX(0); }
            aside { transform: translateX(-100%); transition: transform 0.3s ease; }
            main { margin-left: 0 !important; }
        }

        .data-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 40px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--line);
            transition: background 0.2s ease;
            align-items: center;
        }
        .data-row:hover { background: #F1F5F9; }
        .col-header { font-size: 10px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.05em; }
        .data-value { font-family: var(--f-mono); font-size: 13px; letter-spacing: -0.02em; }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Mobile Header -->
    <div class="lg:hidden fixed top-0 left-0 right-0 bg-white border-b border-slate-200 z-20 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i data-lucide="pie-chart" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight">FolioTrack</h1>
        </div>
        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-50 rounded-lg text-slate-600">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/50 z-10 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="main-sidebar" class="w-64 bg-white border-r border-slate-200 flex flex-col fixed h-full z-20">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <i data-lucide="pie-chart" class="text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">FolioTrack</h1>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-50 rounded-lg text-slate-400">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto" id="sidebar-nav">
            <button onclick="switchTab('summary')" id="tab-summary" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all bg-indigo-50 text-indigo-700">
                <i data-lucide="layout-dashboard" size="18"></i>
                Overview
            </button>

            <button onclick="switchTab('strategies')" id="tab-strategies" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900">
                <i data-lucide="trending-up" size="18"></i>
                Strategies
            </button>

            <div class="pt-6 pb-2 px-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">My Portfolios</p>
            </div>

            <div id="portfolio-list" class="space-y-1">
                <!-- Portfolios will be injected here -->
            </div>

            <div class="pt-4 space-y-2">
                <button 
                    onclick="document.getElementById('csv-input').click()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-indigo-600 hover:bg-indigo-50 border border-dashed border-indigo-200 mt-4 transition-all"
                >
                    <i data-lucide="upload" class="w-[18px] h-[18px]"></i>
                    Import CSV/Excel
                </button>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-100" id="profile-section">
            <div class="bg-slate-50 rounded-2xl p-4 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold">
                    PG
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold truncate">Prateek G.</p>
                    <p class="text-xs text-slate-500 truncate">Pro Account</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 lg:ml-64 p-4 md:p-8 lg:p-12 pt-20 lg:pt-12">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div>
                <h2 class="text-sm font-bold text-indigo-600 uppercase tracking-widest mb-1" id="header-subtitle">Dashboard</h2>
                <h3 class="text-2xl font-bold text-slate-900" id="header-title">Financial Overview</h3>
            </div>
            <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-4">
                <div class="bg-white border border-slate-200 rounded-xl px-4 py-2 flex items-center gap-3 shadow-sm">
                    <span class="text-xs font-bold text-slate-500">Valuation:</span>
                    <div class="flex bg-slate-100 p-1 rounded-lg">
                        <button onclick="setValuation('eod')" id="val-eod" class="px-3 py-1 text-[10px] font-bold rounded-md transition-all bg-white text-slate-900 shadow-sm">EOD</button>
                        <button onclick="setValuation('live')" id="val-live" class="px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-500 hover:text-slate-700">LIVE</button>
                    </div>
                </div>
                <button onclick="clearAllData()" class="p-2 text-slate-400 hover:text-rose-500 transition-colors" title="Clear All Data">
                    <i data-lucide="trash-2" size="20"></i>
                </button>
            </div>
        </header>

        <div id="content-area">
            <!-- Content will be injected here -->
        </div>
    </main>

    <input type="file" id="csv-input" accept=".csv,.xlsx,.xls" class="hidden" onchange="handleFileUpload(event)">

    <script>
        // --- Constants ---
        const TICKER_NAMES = {
            'AMZN.US': 'Amazon.com, Inc.', 'AAPL.US': 'Apple Inc.', 'GOOG.US': 'Alphabet Inc.',
            'TSLA.US': 'Tesla, Inc.', 'MSFT.US': 'Microsoft Corporation', 'NVDA.US': 'NVIDIA Corporation',
            'META.US': 'Meta Platforms, Inc.', 'V.US': 'Visa Inc.', 'JPM.US': 'JPMorgan Chase & Co.',
            'GS.US': 'The Goldman Sachs Group, Inc.', 'HSBA.LSE': 'HSBC Holdings plc',
            'BARC.LSE': 'Barclays PLC', 'LLOY.LSE': 'Lloyds Banking Group plc', 'BP.LSE': 'BP p.l.c.',
            'AZN.LSE': 'AstraZeneca PLC', 'GSK.LSE': 'GSK plc', 'SHEL.LSE': 'Shell plc',
            'ULVR.LSE': 'Unilever PLC', 'RIO.LSE': 'Rio Tinto Group', 'GLEN.LSE': 'Glencore plc'
        };

        const MARKET_DATA = [
            { sector: "Tech", tickers: ["AAPL.US", "MSFT.US", "GOOG.US", "NVDA.US", "AMZN.US"] },
            { sector: "Financials", tickers: ["JPM.US", "GS.US", "V.US", "HSBA.LSE", "BARC.LSE"] },
            { sector: "Energy", tickers: ["XOM.US", "CVX.US", "BP.LSE", "SHEL.LSE"] },
            { sector: "Healthcare", tickers: ["AZN.LSE", "GSK.LSE", "JNJ.US", "PFE.US"] }
        ];

        // --- State ---
        let activeTab = 'summary';
        let valuationMode = 'eod';
        let portfolios = JSON.parse(localStorage.getItem('ft_portfolios')) || [];
        let livePrices = {};
        let isPriceLoading = false;
        let marketSummaryData = [];
        let isMarketLoading = false;
        let chartInstance = null;

        const PRICE_API_BASE = "https://my-api-backend.vercel.app/api/data";

        // --- Utilities ---
        const formatCurrency = (val) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(val);
        const parseNum = (val) => {
            if (!val) return 0;
            const n = parseFloat(String(val).replace(/[^0-9.-]/g, ''));
            return isNaN(n) ? 0 : n;
        };

        // --- Core Logic ---
        async function fetchLivePrice(symbol) {
            try {
                const res = await fetch(`${PRICE_API_BASE}?symbol=${symbol}`);
                const data = await res.json();
                if (data && data.price) {
                    livePrices[symbol] = parseFloat(data.price);
                    return true;
                }
            } catch (err) { console.warn(`Price fetch failed: ${symbol}`); }
            return false;
        }

        async function refreshAllLivePrices() {
            if (isPriceLoading) return;
            const symbols = [...new Set(portfolios.flatMap(p => p.holdings.map(h => h.symbol)))];
            if (symbols.length === 0) return;
            isPriceLoading = true;
            render();
            await Promise.all(symbols.map(s => fetchLivePrice(s)));
            isPriceLoading = false;
            render();
        }

async function fetchMarketSummary() {

  if (isMarketLoading) return;

  isMarketLoading = true;

  try {

    const sectors = [];

    for (const sector of MARKET_DATA) {

      const tickers = [];

      for (const symbol of sector.tickers) {

        try {

          const res = await fetch(
            `https://my-api-backend.vercel.app/api/data?symbol=${symbol}`
          );

          const data = await res.json();

          tickers.push({
            symbol: symbol,
            price: Number(data.price),
            change: 0
          });

        } catch (err) {

          console.warn("Price fetch failed:", symbol);

          tickers.push({
            symbol: symbol,
            price: 0,
            change: 0
          });

        }

      }

      sectors.push({
        name: sector.sector,
        avgChange: 0,
        status: "Live",
        trend: "Live pricing",
        tickers
      });

    }

    marketSummaryData = sectors;

  } catch (err) {

    console.error("Market summary error:", err);

  }

  isMarketLoading = false;

  render();
}

        function switchTab(id) {
            activeTab = id;
            if (window.innerWidth < 1024) toggleSidebar();
            render();
        }

        function setValuation(mode) {
            valuationMode = mode;
            if (mode === 'live') refreshAllLivePrices();
            render();
        }

        function toggleSidebar() {
            document.body.classList.toggle('sidebar-open');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('trades')) || workbook.SheetNames[0];
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
                processTrades(rawData);
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function processTrades(rawData) {
            if (rawData.length < 2) return;
            const startIdx = isNaN(parseFloat(rawData[0][2])) ? 1 : 0;
            const temp = {};
            for (let i = startIdx; i < rawData.length; i++) {
                const row = rawData[i];
                if (row.length < 2) continue;
                const pName = row[0]?.trim() || 'Imported';
                const symbol = row[1]?.trim() || 'UNKNOWN';
                const shares = parseNum(row[2]);
                const price = parseNum(row[14]); // Col O
                const currency = row[4]?.trim() || 'GBP';
                const fx = parseNum(row[16], 1); // Col Q
                let adjPrice = currency === 'GBp' ? price / 100 : price;
                if (symbol.endsWith('.US') && fx) adjPrice /= fx;
                if (!temp[pName]) temp[pName] = {};
                if (temp[pName][symbol]) {
                    temp[pName][symbol].shares += shares;
                    temp[pName][symbol].value += shares * adjPrice;
                } else {
                    temp[pName][symbol] = { symbol, name: TICKER_NAMES[symbol] || symbol, shares, price: adjPrice, value: shares * adjPrice, strategy: row[12] || 'N/A' };
                }
            }
            Object.entries(temp).forEach(([name, holdingsMap]) => {
                const holdings = Object.values(holdingsMap);
                const existing = portfolios.find(p => p.name === name);
                if (existing) existing.holdings = holdings;
                else portfolios.push({ id: 'p-' + Date.now(), name, color: '#6366F1', holdings, cash: 0 });
            });
            localStorage.setItem('ft_portfolios', JSON.stringify(portfolios));
            render();
        }

        function clearAllData() {
            if (confirm('Clear all data?')) {
                localStorage.clear();
                portfolios = [];
                render();
            }
        }

        // --- Rendering ---
        function render() {
            renderSidebar();
            renderHeader();
            renderContent();
            lucide.createIcons();
        }

        function renderSidebar() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = portfolios.map(p => `
                <button onclick="switchTab('${p.id}')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium transition-all group ${activeTab === p.id ? 'bg-slate-900 text-white' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full" style="background-color: ${p.color}"></div>
                        ${p.name}
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 ${activeTab === p.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}"></i>
                </button>
            `).join('');
            document.getElementById('tab-summary').className = activeTab === 'summary' ? "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all bg-indigo-50 text-indigo-700" : "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900";
        }

        function renderHeader() {
            document.getElementById('header-title').innerText = activeTab === 'summary' ? 'Financial Overview' : (portfolios.find(p => p.id === activeTab)?.name || 'Portfolio');
            const eodBtn = document.getElementById('val-eod');
            const liveBtn = document.getElementById('val-live');
            eodBtn.className = valuationMode === 'eod' ? "px-3 py-1 text-[10px] font-bold rounded-md transition-all bg-white text-slate-900 shadow-sm" : "px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-500 hover:text-slate-700";
            liveBtn.className = valuationMode === 'live' ? "px-3 py-1 text-[10px] font-bold rounded-md transition-all bg-white text-slate-900 shadow-sm" : "px-3 py-1 text-[10px] font-bold rounded-md transition-all text-slate-500 hover:text-slate-700";
        }

        function renderContent() {
            const container = document.getElementById('content-area');
            if (activeTab === 'summary') renderSummary(container);
            else renderDetail(container);
        }

        function renderSummary(container) {
            if (marketSummaryData.length === 0 && !isMarketLoading) fetchMarketSummary();
            const total = portfolios.reduce((acc, p) => acc + p.holdings.reduce((hAcc, h) => hAcc + (h.shares * (valuationMode === 'live' ? (livePrices[h.symbol] || h.price) : h.price)), 0), 0);
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                    <div class="lg:col-span-2 bg-indigo-600 rounded-3xl p-10 text-white relative overflow-hidden shadow-2xl">
                        <h2 class="text-4xl font-bold mb-4">Portfolio Intelligence</h2>
                        <p class="text-indigo-100 mb-8 max-w-md">Track your global assets with precision. Import your trades to see real-time performance.</p>
                        <button onclick="document.getElementById('csv-input').click()" class="bg-white text-indigo-600 px-8 py-4 rounded-2xl font-bold hover:bg-indigo-50 shadow-xl flex items-center gap-3">
                            <i data-lucide="upload"></i> Import Data
                        </button>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <p class="text-slate-500 font-bold text-xs uppercase tracking-widest mb-2">Total Net Worth (${valuationMode.toUpperCase()})</p>
                        <h3 class="text-4xl font-bold text-slate-900">${formatCurrency(total)}</h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <h3 class="text-xl font-bold text-slate-900 mb-8">Asset Allocation</h3>
                        <div class="chart-container"><canvas id="summaryChart"></canvas></div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                        <h3 class="text-xl font-bold text-slate-900 mb-8">Market Summary</h3>
                        <div class="space-y-4">
                            ${isMarketLoading ? '<p class="text-center py-12 animate-pulse">Loading market data...</p>' : marketSummaryData.map(s => `
                                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <div class="flex justify-between font-bold text-sm"><span>${s.name}</span><span class="text-emerald-600">Live</span></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            setTimeout(initSummaryChart, 0);
        }

        function renderDetail(container) {
            const p = portfolios.find(p => p.id === activeTab);
            if (!p) return;
            container.innerHTML = `
                <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                    <div class="data-row bg-slate-50/50 font-bold">
                        <div class="col-header">Asset</div><div class="col-header">Strategy</div><div class="col-header">Shares</div><div class="col-header">Price</div><div class="col-header">Value</div><div></div>
                    </div>
                    ${p.holdings.map(h => {
                        const price = valuationMode === 'live' ? (livePrices[h.symbol] || h.price) : h.price;
                        return `
                            <div class="data-row">
                                <div class="font-bold">${h.symbol}</div>
                                <div><span class="px-2 py-1 bg-slate-100 rounded text-[10px] font-bold">${h.strategy}</span></div>
                                <div class="data-value">${h.shares}</div>
                                <div class="data-value ${valuationMode === 'live' && livePrices[h.symbol] ? 'text-indigo-600 font-bold' : ''}">${formatCurrency(price)}</div>
                                <div class="data-value font-bold">${formatCurrency(h.shares * price)}</div>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function initSummaryChart() {
            const ctx = document.getElementById('summaryChart');
            if (!ctx) return;
            const data = portfolios.map(p => ({
                label: p.name,
                value: p.holdings.reduce((acc, h) => acc + (h.shares * (valuationMode === 'live' ? (livePrices[h.symbol] || h.price) : h.price)), 0),
                color: p.color
            }));
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: data.map(d => d.label), datasets: [{ data: data.map(d => d.value), backgroundColor: data.map(d => d.color), borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
            });
        }

        render();
    </script>
</body>
</html>
