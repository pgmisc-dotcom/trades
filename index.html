<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#0f172a;
    color:#e2e8f0;
}
header{
    padding:20px;
    background:#1e293b;
    font-size:22px;
    font-weight:bold;
}
.container{
    padding:20px;
    max-width:1100px;
    margin:auto;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:left;
}
.green{color:#22c55e}
.red{color:#ef4444}
button{
    background:#3b82f6;
    border:none;
    padding:10px 16px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>

<body>

<header>
Portfolio Dashboard
</header>

<div class="container">

<div class="card">
<button onclick="refreshPrices()">Refresh Prices</button>
</div>

<div class="card">
<h3>Portfolio Holdings</h3>
<table id="portfolioTable">
<thead>
<tr>
<th>Ticker</th>
<th>Quantity</th>
<th>Price</th>
<th>Value</th>
<th>Change %</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="card">
<h3>Market Summary</h3>
<div id="marketSummary"></div>
</div>

</div>

<script>

const API_BASE = "https://my-api-backend.vercel.app/api/data";

let portfolio = [
{symbol:"AAPL.US", qty:10, price:0, change:0},
{symbol:"MSFT.US", qty:6, price:0, change:0},
{symbol:"GOOGL.US", qty:4, price:0, change:0}
];

const marketIndexes = [
{ name:"S&P 500", symbol:"SPY.US" },
{ name:"Nasdaq", symbol:"QQQ.US" },
{ name:"Dow Jones", symbol:"DIA.US" }
];

async function fetchPrices(symbols){

    const url = `${API_BASE}?symbols=${symbols.join(",")}`;

    const res = await fetch(url);

    if(!res.ok) throw new Error("Price fetch failed");

    return await res.json();
}

async function loadPortfolioPrices(){

    const symbols = portfolio.map(p=>p.symbol);

    const data = await fetchPrices(symbols);

    const map = {};
    data.forEach(d=>{
        const key = `${d.code}.${d.exchange_short_name}`;
        map[key] = d;
    });

    portfolio.forEach(p=>{
        const d = map[p.symbol];
        if(d){
            p.price = d.close;
            p.change = d.change_p;
        }
    });

}

function renderPortfolio(){

    const tbody = document.querySelector("#portfolioTable tbody");

    tbody.innerHTML = "";

    portfolio.forEach(p=>{

        const value = p.qty * p.price;

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${p.symbol}</td>
        <td>${p.qty}</td>
        <td>${p.price.toFixed(2)}</td>
        <td>${value.toFixed(2)}</td>
        <td class="${p.change>=0?'green':'red'}">
        ${p.change>=0?'+':''}${p.change.toFixed(2)}%
        </td>
        `;

        tbody.appendChild(row);

    });

}

async function loadMarketSummary(){

    const symbols = marketIndexes.map(i=>i.symbol);

    const data = await fetchPrices(symbols);

    const map = {};
    data.forEach(d=>{
        const key = `${d.code}.${d.exchange_short_name}`;
        map[key] = d;
    });

    const changes = [];

    let html = "";

    marketIndexes.forEach(i=>{

        const d = map[i.symbol];

        if(!d) return;

        const change = d.change_p;

        changes.push(change);

        html += `<div class="${change>=0?'green':'red'}">
        ${i.name}: ${change>=0?'+':''}${change.toFixed(2)}%
        </div>`;

    });

    const valid = changes.filter(v=>!isNaN(v));

    const avg = valid.length
        ? (valid.reduce((a,b)=>a+b,0)/valid.length).toFixed(2)
        : "0.00";

    html += `<br><strong>Global Avg: ${avg}%</strong>`;

    document.getElementById("marketSummary").innerHTML = html;

}

async function refreshPrices(){

    try{

        await loadPortfolioPrices();

        renderPortfolio();

        await loadMarketSummary();

    }catch(err){

        console.error(err);

        alert("Price fetch failed");

    }

}

refreshPrices();

</script>

</body>
</html>
